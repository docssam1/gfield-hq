name: Build & Deploy

on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        working-directory: frontend
        run: |
          npm install -g pnpm
          pnpm install
          pnpm run build --if-present || echo 'no build'
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: \${{ secrets.GCP_SA_KEY }}
          project_id: \${{ secrets.GCP_PROJECT }}
      - name: Deploy app
        run: |
          echo "Placeholder for Cloud Run deploy"
